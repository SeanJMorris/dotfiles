- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    ~/.zshrc: zshrc
    ~/.zshenv: zshenv
    ~/.gitconfig: gitconfig
    ~/.bashrc: bashrc
    ~/.bash_aliases: bash_aliases
    ~/.vim/: vim/
    ~/.vimrc: vimrc
    ~/.config/bat/:
      create: true
      path: bat/

#   ~/.tmux.conf: tmux.conf

#- create:
#   - ~/hey/you/guys
#   - ~/downloads
#   - ~/.vim/undo-history

- shell:
    - command: ./setup_homebrew.zsh
      stdout: true
      stderr: true
    - command: ./setup_zsh.zsh
      stdout: true
      stderr: true
